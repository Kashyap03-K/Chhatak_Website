databases:
  - name: chhatak-db
    plan: free
    databaseName: chhatak
    user: chhatak

services:
  - type: web
    name: chhatak-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chhatak-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://chhatak.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: orders@chhatak.co
    healthCheckPath: /api/health

  - type: web
    name: chhatak
    runtime: node
    buildCommand: npm install && npm run build && npm install -g serve
    startCommand: serve dist -s -l $PORT
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
