databases:
  - name: chhatak-db
    plan: free
    databaseName: chhatak
    user: chhatak

services:
  - type: web
    name: chhatak-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chhatak-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://chhatak.onrender.com
      - key: FROM_EMAIL
        value: orders@chhatak.co
    healthCheckPath: /api/health

  - type: web
    name: chhatak
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://chhatak-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
