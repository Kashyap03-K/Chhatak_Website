databases:
  - name: chhatak-db
    plan: free
    databaseName: chhatak
    user: chhatak

services:
  - type: web
    name: chhatak-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chhatak-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://chhatak.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: orders@chhatak.co
    healthCheckPath: /api/health

  - type: static
    name: chhatak
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
